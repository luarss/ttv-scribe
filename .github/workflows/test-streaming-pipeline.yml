name: Test Streaming Pipeline

on:
  workflow_dispatch:
    inputs:
      max_vods:
        description: 'Max VODs to process'
        required: true
        type: number
        default: 5
      max_duration_minutes:
        description: 'Max VOD duration to add to queue (minutes)'
        required: true
        type: number
        default: 60
      max_transcription_minutes:
        description: 'Stop after this many minutes of transcription'
        required: true
        type: number
        default: 60

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          LOG_LEVEL=INFO
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          MAX_TRANSCRIPTION_WORKERS=2
          EOF

      - name: Run streaming pipeline (test)
        run: |
          start_time=$(date +%s)
          uv run python -c "from src.pipeline import run_pipeline; run_pipeline(max_duration_minutes=${{ github.event.inputs.max_duration_minutes }}, max_vods=${{ github.event.inputs.max_vods }}, max_transcription_minutes=${{ github.event.inputs.max_transcription_minutes }})"
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          echo "Pipeline duration: ${duration}s"

      - name: Commit and push transcripts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "test: run streaming pipeline test"
          file_pattern: transcripts/* state/*
          pull_strategy: merge