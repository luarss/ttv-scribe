name: Transcribe VOD

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Twitch username'
        required: true
        type: string
      vod_id:
        description: 'VOD ID to transcribe'
        required: true
        type: string

jobs:
  transcribe-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv sync
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          WHISPER_USE_LOCAL=true
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          DATABASE_URL=sqlite:///./ttv_scribe.db
          LOG_LEVEL=INFO
          EOF

      - name: Install dependencies
        run: uv pip install --system --break-system-packages -e .

      - name: Run transcription
        run: uv run python scripts/transcribe_vod.py ${{ github.event.inputs.username }} ${{ github.event.inputs.vod_id }}

      - name: Commit transcript file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add transcript for ${{ github.event.inputs.username }}/${{ github.event.inputs.vod_id }}"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          file_pattern: "transcripts/*.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}