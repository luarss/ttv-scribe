name: Transcribe VOD

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Twitch username'
        required: true
        type: string
      vod_id:
        description: 'VOD ID to transcribe'
        required: true
        type: string

jobs:
  transcribe-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          WHISPER_USE_LOCAL=true
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          DATABASE_URL=sqlite:///./ttv_scribe.db
          LOG_LEVEL=INFO
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Run transcription
        run: python scripts/transcribe_vod.py ${{ github.event.inputs.username }} ${{ github.event.inputs.vod_id }}

      - name: Commit transcript file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add transcript for ${{ github.event.inputs.username }}/${{ github.event.inputs.vod_id }}"
          file_pattern: "transcripts/*.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}