name: Process VOD Queue

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of VODs to process'
        required: true
        type: number
        default: 5
      beam_size:
        description: 'Whisper beam size (lower = faster, 1-5)'
        required: false
        type: number
        default: 5

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-model-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            whisper-model-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          WHISPER_BEAM_SIZE=${{ github.event.inputs.beam_size || '5' }}
          WHISPER_VAD_MIN_SILENCE_MS=500
          LOG_LEVEL=INFO
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          EOF

      - name: Process queue
        env:
          MAX_VODS: ${{ github.event.inputs.count || '5' }}
        run: |
          if ! [[ "$MAX_VODS" =~ ^[0-9]+$ ]]; then
            echo "Error: count must be a non-negative integer" && exit 1
          fi
          uv run python -c "import os; from src.pipeline import run_pipeline; run_pipeline(max_vods=int(os.environ['MAX_VODS']))"

      - name: Commit and push transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
            exit 0
          fi
          git commit -m "feat: process VODs from queue"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
