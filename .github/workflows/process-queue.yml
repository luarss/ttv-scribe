name: Process VOD Queue

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of VODs to process'
        required: true
        type: number
        default: 5

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          LOG_LEVEL=INFO
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          EOF

      - name: Process queue
        run: uv run python -c "from src.pipeline import run_pipeline; run_pipeline(max_vods=${{ github.event.inputs.count }})"

      - name: Commit and push transcripts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: process VODs from queue"
          file_pattern: transcripts/* state/*
          pull_strategy: merge