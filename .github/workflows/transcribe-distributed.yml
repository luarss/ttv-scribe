name: Transcribe VOD (Distributed)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      vod_id:
        description: 'VOD ID to transcribe (Twitch or Bilibili)'
        required: false
        type: string
      platform:
        description: 'Platform (leave empty to auto-detect from queue)'
        required: false
        type: string
        default: ''
      max_parallel:
        description: 'Max parallel workers (default: 10)'
        required: false
        type: number
        default: 10
      beam_size:
        description: 'Whisper beam size (lower = faster, 1-5)'
        required: false
        type: number
        default: 5

concurrency:
  group: transcribe-distributed
  cancel-in-progress: false

jobs:
  # Job 1: Download VOD and split into chunks
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      vod_id: ${{ steps.select-vod.outputs.vod_id || steps.split.outputs.vod_id }}
      platform: ${{ steps.select-vod.outputs.platform || steps.split.outputs.platform }}
      streamer: ${{ steps.split.outputs.streamer }}
      title: ${{ steps.split.outputs.title }}
      recorded_at: ${{ steps.split.outputs.recorded_at }}
      total_duration: ${{ steps.split.outputs.total_duration }}
      chunk_duration: ${{ steps.split.outputs.chunk_duration }}
      num_chunks: ${{ steps.split.outputs.num_chunks }}
      matrix: ${{ steps.split.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg and aria2
        run: sudo apt-get update && sudo apt-get install -y ffmpeg aria2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv sync

      - name: Create .env file
        run: |
          cat > .env << EOF
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          LOG_LEVEL=INFO
          EOF

      - name: Fetch proxies
        id: proxies
        run: |
          PROXY_CSV=$(uv run python -c "
          from src.proxy import fetch_proxies
          proxies = fetch_proxies(limit=15)
          print(','.join(proxies))
          ")
          echo "csv=$PROXY_CSV" >> $GITHUB_OUTPUT
          echo "Fetched $(echo "$PROXY_CSV" | tr ',' '\n' | grep -c .) proxies"

      - name: Fetch YouTube transcripts
        id: youtube-transcripts
        run: |
          PROXIES="${{ steps.proxies.outputs.csv }}"
          YT_PROXY=$(echo "$PROXIES" | cut -d, -f1)
          if [ -n "$YT_PROXY" ] && [ "$YT_PROXY" != "None" ]; then
            uv run python -c "
          from src.pipeline import fetch_youtube_transcripts
          print(f'Fetched {fetch_youtube_transcripts(max_vods=1, proxy=\"$YT_PROXY\")} YouTube transcript')
          "
          else
            uv run python -c "from src.pipeline import fetch_youtube_transcripts; print(f'Fetched {fetch_youtube_transcripts(max_vods=1)} YouTube transcript')"
          fi

      - name: Select VOD from queue
        id: select-vod
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.vod_id == '')
        run: |
          VOD_INFO=$(uv run python -c "
          import sys
          sys.path.insert(0, 'src')
          from src.state import get_state_manager, Platform

          manager = get_state_manager()
          pending = manager.get_pending_vods()
          # Skip YouTube VODs — they are handled by the main pipeline via youtube-transcript-api
          non_yt = [v for v in pending if v.platform != Platform.YOUTUBE.value]
          if non_yt:
              vod = non_yt[0]
              print(f'{vod.vod_id}|{vod.platform}')
          ")

          if [ -z "$VOD_INFO" ]; then
            echo "No pending VODs in queue"
            exit 0
          fi

          SELECTED_VOD_ID="${VOD_INFO%%|*}"
          SELECTED_PLATFORM="${VOD_INFO##*|}"
          echo "Selected VOD from queue: $SELECTED_VOD_ID (platform: $SELECTED_PLATFORM)"
          echo "vod_id=$SELECTED_VOD_ID" >> $GITHUB_OUTPUT
          echo "platform=$SELECTED_PLATFORM" >> $GITHUB_OUTPUT

      - name: Set platform-specific secrets
        if: steps.select-vod.outputs.vod_id != '' || inputs.vod_id != ''
        run: |
          PLATFORM="${{ steps.select-vod.outputs.platform || inputs.platform || 'twitch' }}"
          if [ "$PLATFORM" = "twitch" ]; then
            cat >> .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          EOF
            echo "Added Twitch secrets for platform: $PLATFORM"
          else
            echo "Platform is $PLATFORM, skipping Twitch secrets"
          fi

      - name: Download and split VOD
        id: split
        if: steps.select-vod.outputs.vod_id != '' || inputs.vod_id != ''
        run: |
          VOD_ID="${{ steps.select-vod.outputs.vod_id || github.event.inputs.vod_id }}"
          PLATFORM="${{ steps.select-vod.outputs.platform || inputs.platform || 'twitch' }}"

          PROXY_ARG=""
          if [ "$PLATFORM" = "kick" ]; then
            PROXY_LIST="${{ steps.proxies.outputs.csv }}"
            if [ -n "$PROXY_LIST" ] && [ "$PROXY_LIST" != "None" ]; then
              PROXY_ARG="--proxy $PROXY_LIST"
              echo "Using $(echo "$PROXY_LIST" | tr ',' '\n' | grep -c .) proxies for Kick"
            fi
          fi

          uv run python -m src.cli.split_vod \
            --platform "$PLATFORM" \
            --output-dir ./chunks \
            $PROXY_ARG \
            -- "$VOD_ID"

          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT

      - name: Upload chunks artifact
        if: steps.split.outcome == 'success' && steps.split.outputs.num_chunks != '0'
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: chunks/
          retention-days: 1
          if-no-files-found: error

      - name: Commit failed VOD status
        if: steps.split.outputs.num_chunks == '0'
        run: |
          VOD_ID="${{ steps.select-vod.outputs.vod_id || github.event.inputs.vod_id }}"
          PLATFORM="${{ steps.select-vod.outputs.platform || inputs.platform || 'twitch' }}"
          if [ "$PLATFORM" = "bilibili" ]; then
            PREFIX="chore: mark Bilibili video"
          else
            PREFIX="chore: mark VOD"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "$PREFIX $VOD_ID as failed (unavailable)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

  # Job 2: Transcribe chunks in parallel
  transcribe:
    needs: prepare
    if: needs.prepare.outputs.num_chunks != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: ${{ github.event.inputs.max_parallel && fromJSON(github.event.inputs.max_parallel) || 10 }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.local/share/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv sync

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-model-${{ runner.os }}-small
          restore-keys: |
            whisper-model-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          WHISPER_BEAM_SIZE=${{ github.event.inputs.beam_size || '5' }}
          WHISPER_VAD_MIN_SILENCE_MS=500
          LOG_LEVEL=INFO
          EOF

      - name: Download chunks with retry
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: chunks/
        continue-on-error: true
        id: download

      - name: Retry download if failed
        if: steps.download.outcome == 'failure'
        run: |
          echo "First download attempt failed, retrying in 30 seconds..."
          sleep 30
          gh run download ${{ github.run_id }} \
            --name "chunks" \
            --dir chunks/ \
            || {
              echo "::error::Failed to download chunks after retry"
              exit 1
            }
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify chunk file exists
        run: |
          CHUNK_INDEX=${{ matrix.index }}
          VOD_ID="${{ needs.prepare.outputs.vod_id }}"
          EXPECTED_FILE="chunks/${VOD_ID}_chunk_$(printf '%03d' ${CHUNK_INDEX}).opus"

          if [ ! -f "$EXPECTED_FILE" ]; then
            echo "::error::Expected chunk file not found: $EXPECTED_FILE"
            echo "Available files in chunks/:"
            ls -la chunks/ || echo "chunks/ directory does not exist"
            exit 1
          fi
          echo "Found chunk file: $EXPECTED_FILE"

      - name: Transcribe chunk ${{ matrix.index }}
        id: transcribe
        run: |
          CHUNK_INDEX=${{ matrix.index }}
          VOD_ID="${{ needs.prepare.outputs.vod_id }}"
          CHUNK_FILE=$(ls chunks/${VOD_ID}_chunk_$(printf '%03d' ${CHUNK_INDEX}).* 2>/dev/null | head -1)

          if [ -z "$CHUNK_FILE" ]; then
            echo "Chunk file not found for index $CHUNK_INDEX"
            exit 1
          fi

          CHUNK_DURATION="${{ needs.prepare.outputs.chunk_duration }}"

          uv run python -m src.cli.transcribe_chunk "$CHUNK_FILE" \
            --chunk-index $CHUNK_INDEX \
            --chunk-duration $CHUNK_DURATION \
            --output "./result-${CHUNK_INDEX}.json"

      - name: Upload chunk result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.index }}
          path: result-${{ matrix.index }}.json
          retention-days: 1

  # Job 3: Assemble results into final transcript
  assemble:
    needs: [prepare, transcribe]
    if: needs.prepare.outputs.num_chunks != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv sync

      - name: Create .env file
        run: |
          cat > .env << EOF
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          LOG_LEVEL=INFO
          EOF

      - name: Download all chunk results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results/
          merge-multiple: true

      - name: Assemble transcript
        run: |
          uv run python -m src.cli.assemble_transcript \
            --vod-id "${{ needs.prepare.outputs.vod_id }}" \
            --streamer "${{ needs.prepare.outputs.streamer }}" \
            --title "${{ needs.prepare.outputs.title }}" \
            --recorded-at "${{ needs.prepare.outputs.recorded_at }}" \
            --total-duration ${{ needs.prepare.outputs.total_duration }} \
            --results-dir ./results

      - name: Commit and push transcript
        run: |
          PLATFORM="${{ needs.prepare.outputs.platform }}"
          if [ "$PLATFORM" = "bilibili" ]; then
            PREFIX="feat: transcribe Bilibili video"
          else
            PREFIX="feat: transcribe VOD"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
            exit 0
          fi
          git commit -m "$PREFIX ${{ needs.prepare.outputs.vod_id }} (distributed)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
