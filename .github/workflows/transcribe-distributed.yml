name: Transcribe VOD (Distributed)

on:
  workflow_dispatch:
    inputs:
      vod_id:
        description: 'Twitch VOD ID to transcribe'
        required: true
        type: string
      chunk_duration:
        description: 'Chunk duration in minutes (default: 10)'
        required: false
        type: number
        default: 10
      max_parallel:
        description: 'Max parallel workers (default: 10)'
        required: false
        type: number
        default: 10
      beam_size:
        description: 'Whisper beam size (lower = faster, 1-5)'
        required: false
        type: number
        default: 5

jobs:
  # Job 1: Download VOD and split into chunks
  prepare:
    runs-on: ubuntu-latest
    outputs:
      vod_id: ${{ steps.split.outputs.vod_id }}
      streamer: ${{ steps.split.outputs.streamer }}
      title: ${{ steps.split.outputs.title }}
      recorded_at: ${{ steps.split.outputs.recorded_at }}
      total_duration: ${{ steps.split.outputs.total_duration }}
      num_chunks: ${{ steps.split.outputs.num_chunks }}
      matrix: ${{ steps.split.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          LOG_LEVEL=INFO
          EOF

      - name: Download and split VOD
        id: split
        run: |
          CHUNK_DURATION=$((${{ github.event.inputs.chunk_duration || '10' }} * 60))
          uv run python -m src.distributed.splitter "${{ github.event.inputs.vod_id }}" \
            --chunk-duration $CHUNK_DURATION \
            --output-dir ./chunks

      - name: Upload chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: chunks/
          retention-days: 1

  # Job 2: Transcribe chunks in parallel
  transcribe:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: ${{ fromJSON(github.event.inputs.max_parallel) || 10 }}
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: whisper-model-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            whisper-model-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          WHISPER_MODEL=small
          WHISPER_DEVICE=cpu
          WHISPER_COMPUTE_TYPE=int8
          WHISPER_BEAM_SIZE=${{ github.event.inputs.beam_size || '5' }}
          WHISPER_VAD_MIN_SILENCE_MS=500
          LOG_LEVEL=INFO
          EOF

      - name: Download chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: chunks/

      - name: Transcribe chunk ${{ matrix.index }}
        id: transcribe
        run: |
          # Find the chunk file (naming: chunk_001.opus, chunk_002.opus, etc.)
          CHUNK_INDEX=${{ matrix.index }}
          CHUNK_FILE=$(ls chunks/chunk_$(printf '%03d' $((CHUNK_INDEX + 1))).* 2>/dev/null | head -1)

          if [ -z "$CHUNK_FILE" ]; then
            echo "Chunk file not found for index $CHUNK_INDEX"
            exit 1
          fi

          CHUNK_DURATION=$((${{ github.event.inputs.chunk_duration || '10' }} * 60))

          uv run python -m src.distributed.worker "$CHUNK_FILE" \
            --chunk-index $CHUNK_INDEX \
            --chunk-duration $CHUNK_DURATION \
            --output "./result-${CHUNK_INDEX}.json"

      - name: Upload chunk result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.index }}
          path: result-${{ matrix.index }}.json
          retention-days: 1

  # Job 3: Assemble results into final transcript
  assemble:
    needs: [prepare, transcribe]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          LOG_LEVEL=INFO
          EOF

      - name: Download all chunk results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: results/
          merge-multiple: true

      - name: Assemble transcript
        run: |
          uv run python -m src.distributed.assembler \
            --vod-id "${{ needs.prepare.outputs.vod_id }}" \
            --streamer "${{ needs.prepare.outputs.streamer }}" \
            --title "${{ needs.prepare.outputs.title }}" \
            --recorded-at "${{ needs.prepare.outputs.recorded_at }}" \
            --total-duration ${{ needs.prepare.outputs.total_duration }} \
            --results-dir ./results

      - name: Commit and push transcript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
            exit 0
          fi
          git commit -m "feat: transcribe VOD ${{ needs.prepare.outputs.vod_id }} (distributed)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
