name: Process VOD Queue (Parallel)

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of VODs to process in parallel'
        required: true
        type: number
        default: 3
      beam_size:
        description: 'Whisper beam size (lower = faster, 1-5)'
        required: false
        type: string
        default: "5"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up environment
        run: |
          uv venv
          uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
          STATE_FILE_DIR=./state
          TRANSCRIPT_DIR=./transcripts
          LOG_LEVEL=INFO
          EOF

      - name: Get pending VODs
        id: get-vods
        run: |
          # Get pending VOD IDs
          VOD_IDS=$(uv run python -c "
          import sys
          sys.path.insert(0, 'src')
          from src.state import get_state_manager

          manager = get_state_manager()
          pending = [v.vod_id for v in manager.vods.values() if v.status == 'PENDING']
          for vod_id in pending[:${{ inputs.count }}]:
              print(vod_id)
          ")

          # Store as multiline output
          {
            echo "vod_ids<<EOF"
            echo "$VOD_IDS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "Found VODs to process:"
          echo "$VOD_IDS"

      - name: Trigger parallel workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ steps.get-vods.outputs.vod_ids }}" | while read -r vod_id; do
            if [ -n "$vod_id" ]; then
              echo "Dispatching workflow for VOD: $vod_id"
              gh workflow run transcribe-distributed.yml \
                -f vod_id="$vod_id" \
                -f beam_size=${{ inputs.beam_size }} \
                -f max_parallel=10
              sleep 2  # Small delay between dispatches
            fi
          done

          echo "All workflows dispatched!"
